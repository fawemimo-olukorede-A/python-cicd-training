# =============================================================================
# LESSON 1: Continuous Integration (CI) Pipeline
# =============================================================================
# This workflow runs on every push and pull request.
# It builds, tests, and lints the code to ensure quality.
#
# TRIGGERS:
#   - push: Runs when code is pushed to main or develop
#   - pull_request: Runs when a PR is opened against main
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Build and Test
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code from repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Cache pip dependencies (speeds up builds)
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 5: Run linting (code quality check)
      - name: Run Flake8 Linting
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Step 6: Run tests with coverage
      - name: Run Tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      # Step 7: Upload test results (optional but useful)
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # JOB 2: Security Scan (Advanced)
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test  # Only run if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install safety
        run: pip install safety

      - name: Check for vulnerable dependencies
        run: |
          pip install -r requirements.txt
          safety check || true  # Don't fail the build, just warn
